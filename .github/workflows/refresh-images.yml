name: Weekly Image URL Refresh

on:
  schedule:
    # 每周一 UTC 01:00（北京时间 09:00）
    - cron: '0 1 * * 1'
  workflow_dispatch:  # 也支持手动触发

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Refresh image URLs
        run: node scripts/refresh_urls.js
        continue-on-error: true

      - name: Commit updated knowledge base
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add references/knowledge/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly image URL refresh [$(date -u '+%Y-%m-%d')]"
            git push
          fi
